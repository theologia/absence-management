spring:
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/absence_db}
    username: ${SPRING_DATASOURCE_USERNAME:absence_user}
    password: ${SPRING_DATASOURCE_PASSWORD:secret123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

absence:
  threshold: ${ABSENCE_THRESHOLD:33}

logging:
  level:
    gr.certh.absence: INFO
