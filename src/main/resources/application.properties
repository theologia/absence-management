# ── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/absence_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:absence_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Springdoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ── Business rules ────────────────────────────────────────────────────────────
absence.threshold=${ABSENCE_THRESHOLD:33}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.gr.techpro.absence=INFO
